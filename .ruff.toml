# ========================
# RUFF CONFIG
# Equivalent to eslint.config.mjs
# ========================

target-version = "py312"
line-length = 88

[lint]
select = [
  "E",     # pycodestyle errors
  "W",     # pycodestyle warnings
  "F",     # pyflakes — unused imports, undefined names
  "I",     # isort — import order (equiv import/order)
  "C901",  # mccabe complexity (equiv complexity max 15)
  "D",     # pydocstyle — docstrings (equiv jsdoc/require-*)
  "T20",   # no print() (equiv no-console warn/error only)
  "TCH",   # type-checking imports (equiv consistent-type-imports)
  "RUF",   # ruff-specific — RUF006 = unawaited async (equiv no-floating-promises)
  "ANN",   # annotations (equiv no-explicit-any)
  "UP",    # pyupgrade
  "B",     # bugbear — common bug patterns
  "SIM",   # simplify
  "N",     # pep8 naming
]
ignore = [
  "D203",   # conflicts with D211
  "D213",   # conflicts with D212
  "ANN101", # self needs no annotation
  "ANN102", # cls needs no annotation
]

# equiv: no-restricted-imports (relative parent imports)
# enforced via B010 + manual convention

[lint.mccabe]
max-complexity = 15  # equiv: complexity: ["error", { max: 15 }]

[lint.pydocstyle]
convention = "google"

[lint.isort]
known-first-party = ["src"]
force-sort-within-sections = true
# equiv: groups builtin > external > internal, alphabetize asc

[lint.per-file-ignores]
# equiv: TESTS OVERRIDE
"**/test_*.py" = ["D", "ANN", "T20", "S", "SIM"]
"**/*_test.py" = ["D", "ANN", "T20", "S", "SIM"]
"**/conftest.py" = ["D", "ANN"]
